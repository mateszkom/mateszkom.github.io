<!DOCTYPE html>
<html>
  <head>
    <title>Notes</title>
    <style>
      body {
        font-family: "Merriweather", sans-serif;
        width: 600px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
      }

      .content {
        margin-top: 20px;
      }
      li {
        margin-bottom: 10px;
      }
      a {
        font-weight: bold;
      }
      .nav {
        font-size: 0.6em;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Merriweather"
    />
  </head>
  <body>
    <h1>Mateusz Skomorucha <a class="nav" href="/index.html">Go back</a></h1>
    <div class="content">
      <h2>Config2023</h2>
      <p>About the figma conference</p>

      <ul id="sessionsList"></ul>
    </div>

    <script>
      const sessions = [
        {
          rating: "★★★★★ -",
          link: "https://config.figma.com/video-on-demand/6329860874112",
          title: "Opening sessions",
          time: "0:00 - 50:00",
          description: "figma new stuff",
        },
        {
          rating: "★★★★☆ -",
          link: "https://config.figma.com/video-on-demand/6329869293112",
          title:
            "Prototyping the path: how Slack builds product with customer love",
          time: "",
          description:
            "about Slack and their principles. Small things that make a difference in the product design and maintaining the product.",
        },
        {
          rating: "★★★★☆ -",
          link: "https://config.figma.com/video-on-demand/6329870220112",
          title: "Figma like the pros",
          time: "",
          description: "hot tips, some useful some not so much",
        },
        {
          rating: "★★★☆☆ -",
          link: "https://config.figma.com/video-on-demand/6329862841112",
          title: "Design Ops: Driving change with design systems and process",
          time: "3:00-25:00",
          description:
            "about design systems and how important they are and also how to not waste time in teams by delivering more value",
        },
        {
          rating: "★★★★☆ -",
          link: "https://config.figma.com/video-on-demand/6329924726112",
          title: "AI and the future of Design",
          time: "",
          description: `
          <b>1/5</b> - How to move from atoms to patterns, how AI create new possibilities and help with each part of design process
          <br><b>2/5</b> - How Diagram products works and how they were made, really cool stuff. Figma acquired Diagram so it could be free in the future, i hope
          <br><b>3/5</b> - history of AI stuff, not important, skip it
          <br><b>4/5</b> - Adobe and AI, how they tackle the problem with stealing designs
          <br><b>5/5</b> - also skip it`,
        },
      ];

      const sessionsList = document.getElementById("sessionsList");

      sessions.forEach((session) => {
        const listItem = document.createElement("li");

        const rating = document.createElement("span");
        rating.textContent = session.rating;

        const link = document.createElement("a");
        link.setAttribute("target", "_blank");
        link.setAttribute("href", session.link);
        link.textContent = session.title;

        const time = document.createElement("i");
        time.textContent = session.time;

        const description = document.createElement("span");
        description.innerHTML = session.description;

        listItem.appendChild(rating);
        listItem.appendChild(document.createTextNode(" "));
        listItem.appendChild(link);
        listItem.appendChild(document.createElement("br"));
        listItem.appendChild(time);
        listItem.appendChild(document.createElement("br"));
        listItem.appendChild(description);

        sessionsList.appendChild(listItem);
      });
    </script>
  </body>
</html>
